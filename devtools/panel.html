<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <header class="toolbar">
    <div class="toolbar-left">
      <span class="logo" aria-hidden="true">✓</span>
      <h1>UI Checker</h1>
      <span class="badge" id="badge" aria-label="findings count">0</span>
    </div>
    <div class="toolbar-right">

      <!-- Clone Page: labeled button with icon -->
      <button class="tool-btn tool-btn-labeled" id="btn-clone-page" title="Copy full page HTML to clipboard">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1" y="3" width="10" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M5 1h9a1 1 0 0 1 1 1v11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Clone Page</span>
      </button>

      <!-- Clone Component: labeled button; requires $0 selection in Elements panel -->
      <button class="tool-btn tool-btn-labeled" id="btn-clone-component" title="Copy selected element HTML + styles ($0 in Elements panel)">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <rect x="8" y="8" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M8 4.5h4M4.5 8v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Clone Component</span>
      </button>

      <div class="tool-divider" role="separator"></div>

      <!-- Copy all findings as markdown -->
      <button class="tool-btn" id="btn-copy-all" title="Copy all findings as Markdown">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M11 1H3a2 2 0 0 0-2 2v10h2V3h8V1zm3 3H7a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 11H7V6h7v9z" fill="currentColor"/>
        </svg>
      </button>

      <!-- Re-scan -->
      <button class="tool-btn" id="btn-rescan" title="Re-scan page">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M13.65 2.35A8 8 0 1 0 16 8h-2a6 6 0 1 1-1.76-4.24L10 6h6V0l-2.35 2.35z" fill="currentColor"/>
        </svg>
      </button>

      <!-- Toggle overlays -->
      <button class="tool-btn" id="btn-toggle" title="Toggle overlays">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 3C4.36 3 1.26 5.28 0 8.5c1.26 3.22 4.36 5.5 8 5.5s6.74-2.28 8-5.5C14.74 5.28 11.64 3 8 3zm0 9.17c-2.58 0-4.67-2.09-4.67-4.67S5.42 2.83 8 2.83s4.67 2.09 4.67 4.67S10.58 12.17 8 12.17zM8 5a3.5 3.5 0 1 0 0 7 3.5 3.5 0 0 0 0-7z" fill="currentColor"/>
        </svg>
      </button>

      <!-- Settings -->
      <button class="tool-btn" id="btn-settings" title="Settings" aria-expanded="false">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M13.6 8.8c.04-.26.06-.53.06-.8s-.02-.54-.06-.8l1.74-1.36a.42.42 0 0 0 .1-.52l-1.64-2.84a.41.41 0 0 0-.5-.18l-2.06.82a5.96 5.96 0 0 0-1.38-.8L9.5.2A.4.4 0 0 0 9.1 0H5.82a.4.4 0 0 0-.4.34l-.3 2.12c-.5.2-.96.48-1.38.8l-2.06-.82a.4.4 0 0 0-.5.18L-.46 5.46a.41.41 0 0 0 .1.52L1.38 7.34c-.04.26-.06.53-.06.8s.02.54.06.8L-.36 10.3a.42.42 0 0 0-.1.52l1.64 2.84c.1.18.32.24.5.18l2.06-.82c.42.32.88.6 1.38.8l.3 2.12a.4.4 0 0 0 .4.34h3.28a.4.4 0 0 0 .4-.34l.3-2.12c.5-.2.96-.48 1.38-.8l2.06.82c.18.08.4 0 .5-.18l1.64-2.84a.41.41 0 0 0-.1-.52L13.6 8.8zM7.46 10.8c-1.56 0-2.82-1.26-2.82-2.8s1.26-2.8 2.82-2.8 2.82 1.26 2.82 2.8-1.26 2.8-2.82 2.8z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Clone feedback toast — sits between toolbar and content -->
  <div class="clone-toast" id="clone-toast" role="status" aria-live="polite"></div>

  <!-- Settings panel -->
  <div id="settings-container" style="display:none" role="region" aria-label="Settings">
    <div class="settings-header">Preferences</div>

    <div class="setting-row">
      <div class="setting-label-group">
        <span class="setting-label">Auto-scan</span>
        <span class="setting-hint">When to automatically run a scan</span>
      </div>
      <div class="setting-segmented" id="auto-scan-mode">
        <button data-value="panel" title="Scan when the UI Checker panel is opened">Panel opens</button>
        <button data-value="devtools" title="Scan whenever DevTools is opened">DevTools opens</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label-group">
        <span class="setting-label">Line length</span>
        <span class="setting-hint">Max chars before flagging long lines</span>
      </div>
      <div class="setting-segmented" id="line-length-mode">
        <button data-value="strict" title="Flag lines over 80 characters">Strict 80</button>
        <button data-value="lax"    title="Flag lines over 120 characters">Lax 120</button>
      </div>
    </div>

    <div class="setting-row">
      <div class="setting-label-group">
        <span class="setting-label">Spotlight blur</span>
        <span class="setting-hint">Blur/dim page when hovering a finding</span>
      </div>
      <label class="setting-switch">
        <input type="checkbox" id="spotlight-blur-toggle">
        <span class="setting-switch-track"></span>
      </label>
    </div>

    <div id="settings-list" role="group" aria-label="Rule toggles"></div>
  </div>

  <!-- Findings area — scan-overlay injected here by JS during re-scan -->
  <main id="findings-container" role="region" aria-label="Findings" aria-live="polite">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon" aria-hidden="true">✓</div>
      <p class="empty-title">No anti-patterns detected</p>
      <p class="empty-hint">Overlays appear on page when issues are found</p>
    </div>
  </main>

  <script src="panel.js"></script>
</body>
</html>
